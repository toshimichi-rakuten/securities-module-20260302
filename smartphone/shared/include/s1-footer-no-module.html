<script>

  $(window).on('load scroll',function(){

    var scrollBtn    = $('.bottom-icon__list'),
          windowHeight = $(this).scrollTop(),
          scrollAmount = 56;

    if( windowHeight > scrollAmount ){
      scrollBtn.addClass('fixed').fadeIn();
    }else if( windowHeight < scrollAmount ){
      scrollBtn.removeClass('fixed').fadeOut();
    }

  });

  $('.bottom-icon__item.scrolltop').on('click',function(){

    var speed    = 500,
        easing   = 'swing',
        target   = $('#pagetop'),
        head     = $('#VHEAD'),
        position = target.offset().top - head.outerHeight();

    $("html, body").animate({scrollTop:position}, speed, easing);

    return false;

  });
</script>
