    <h1><span><i class="s-glyph s1-risk__hdg-mark">&#xf119;</i>国内債券のリスクと費用について</span></h1>
    <h2 id="jbond01">国内債券の取引にかかるリスク</h2>
    <p>債券は、債券の価格が市場の金利水準の変化に対応して変動するため、償還前に換金すると損失が生じるおそれがあります。また、債券を発行する組織（発行体）が債務返済不能状態に陥った場合、元本や利子の支払いが滞ったり、不能となったりすることがあります。
    </p>
    <h2 id="jbond02">国内債券の取引にかかる費用</h2>
    <p>国内債券を、楽天証券との相対取引によって購入する場合は、購入対価のみお支払いいただきます（委託手数料はかかりません）。</p>    
  </div>
</div>
