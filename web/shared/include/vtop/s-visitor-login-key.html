<!-- ============ソフトウェアキーボード============ -->

<form name="loginform" method="post" action="http://devmw.rakuten-sec.co.jp:81/bv/app/MhLogin.do" target="_top" class="s-form s-form-vertical s-form-login s-container-20">
  <h2 class="s-ttl">総合口座ログイン</h2>
  <div class="s-container-child">
    <div class="s-controls">
      <p class="s-input-field">
        <label for="form-login-id">ログインID</label>
        <input id="form-login-id" type="text" name="loginid" value="" maxlength="8" tabindex="1" onfocus="chfocus('0')">
      </p>
      <p class="s-input-field">
        <label for="form-login-pass">パスワード</label>
        <input id="form-login-pass" type="password" name="passwd" value="" maxlength="20" tabindex="2" onfocus="chfocus('1')">
      </p><span class="s-icon"></span><a id="keyboard_opener" href="#" class="s-softkey"><i class="sprite-icon-keyboard"></i>ソフトウェアキーボードで入力</a>
      <select name="homeid" tabindex="3">
        <option value="HOME" selected="selected">ホーム画面にログイン</option>
        <option value="STK_POS">保有商品一覧にログイン</option>
        <option value="MARKET_FAVORITE">お気に入り銘柄情報にログイン</option>
        <option value="MARKET_TOP">マーケットにログイン</option>
        <option value="PTF_INFO_BASIC_VST">ポートフォリオにログイン</option>
        <option value="BILLING_VST">リアルタイム入金にログイン</option>
        <option value="JP_STK_BUY_SEARCH">株式注文にログイン</option>
        <option value="ACC_REG_CHANGE_TOP">口座情報にログイン</option>
      </select>
    </div>
  </div>
  <div class="s-container-child">
    <button type="submit" class="s-btn s-btn-login-small" tabindex="4"><i class="s-glyph">&#xf109;</i> ログイン</button><a href="/web/help/care_login.html">IDパスワードはWebで確認できます。<span class="s-link-arrow">&nbsp;&gt;</span></a>
  </div>
</form>
<div class="s-form s-container-20 s-fx">
  <div class="s-controls"><a href="/web/fx/login.html" class="s-btn s-btn-secondary-small">楽天FXへログイン</a></div>
</div>
